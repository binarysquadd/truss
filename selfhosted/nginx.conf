# Truss self-hosted Nginx config
# Serves the dashboard SPA and proxies API/WebSocket requests to the backend.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ──
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # ── Security headers ──
    # Applied to every response (`always` covers error responses too).
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP tuned for a Vite/React SPA + Monaco editor (Monaco needs blob: workers
    # and unsafe-inline/unsafe-eval for its runtime). The API is same-origin here,
    # so connect-src 'self' is enough; operators serving the API on a different
    # origin must extend connect-src (and add it to add_header) accordingly.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; worker-src 'self' blob:; connect-src 'self'" always;

    # ── API proxy ──
    # All /api/* requests are forwarded to the Truss API backend.
    location /api {
        proxy_pass http://truss-api:8787;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Support large request bodies (file uploads via storage API)
        client_max_body_size 100m;
    }

    # ── Client API proxy ──
    # The /v1/* client API surface (used by SDKs and external integrations).
    location /v1 {
        proxy_pass http://truss-api:8787;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── WebSocket proxy for Realtime ──
    # Upgrades HTTP connections to WebSocket for live subscriptions.
    location /realtime {
        proxy_pass http://truss-api:8787;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # ── Static assets ──
    # Cache hashed Vite assets aggressively (filenames contain content hash).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── SPA fallback ──
    # All other routes serve index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
