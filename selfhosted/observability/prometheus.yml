global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # The Truss API exposes RED metrics + DB pool + Node process metrics at /metrics.
  - job_name: truss-api
    metrics_path: /metrics
    static_configs:
      - targets: ["truss-api:8787"]

  # The OTel Collector's own health/metrics.
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
