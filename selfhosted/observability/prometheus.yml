global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # Truss API metrics arrive via remote-write (app → OTLP → collector → remote-write),
  # so there is no direct scrape of truss-api here (a scrape would double-count).

  # The OTel Collector's own health/metrics.
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
