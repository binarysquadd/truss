<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80" role="img" aria-label="Truss icon">
  <!-- Top chord -->
  <line x1="8" y1="10" x2="92" y2="10" stroke="#9f1239" stroke-width="7" stroke-linecap="round"/>
  <!-- Bottom chord -->
  <line x1="8" y1="70" x2="92" y2="70" stroke="#9f1239" stroke-width="7" stroke-linecap="round"/>
  <!-- Verticals -->
  <line x1="8" y1="10" x2="8" y2="70" stroke="#9f1239" stroke-width="7" stroke-linecap="round"/>
  <line x1="50" y1="10" x2="50" y2="70" stroke="#9f1239" stroke-width="7" stroke-linecap="round"/>
  <line x1="92" y1="10" x2="92" y2="70" stroke="#9f1239" stroke-width="7" stroke-linecap="round"/>
  <!-- Diagonals -->
  <line x1="8" y1="70" x2="50" y2="10" stroke="#9f1239" stroke-width="5" stroke-linecap="round" opacity=".4"/>
  <line x1="50" y1="70" x2="92" y2="10" stroke="#9f1239" stroke-width="5" stroke-linecap="round" opacity=".4"/>
  <!-- Nodes -->
  <circle cx="8" cy="10" r="8" fill="#9f1239"/>
  <circle cx="50" cy="10" r="8" fill="#9f1239"/>
  <circle cx="92" cy="10" r="8" fill="#9f1239"/>
  <circle cx="8" cy="70" r="8" fill="#9f1239"/>
  <circle cx="50" cy="70" r="8" fill="#9f1239"/>
  <circle cx="92" cy="70" r="8" fill="#9f1239"/>
</svg>
