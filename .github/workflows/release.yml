name: Release

# release-please drives versioning: pushes to main accumulate into a release PR; merging it
# tags vX.Y.Z, cuts the GitHub Release, and (in the SAME run, gated on release_created) builds +
# signs + publishes every artifact. Gating in one workflow avoids the GITHUB_TOKEN tag-trigger
# recursion block, so no PAT is needed.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  release-please:
    name: Release PR / tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      # Manifest mode prefixes outputs by package path ("." = repo root).
      release_created: ${{ steps.rp.outputs['.--release_created'] }}
      tag_name: ${{ steps.rp.outputs['.--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      - name: Debug release-please outputs
        run: |
          echo "ALL OUTPUTS: ${{ toJSON(steps.rp.outputs) }}"

  images:
    name: Build, sign & publish images
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # attach SBOMs to the release
      packages: write   # push to GHCR
      id-token: write   # cosign keyless (OIDC)
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: truss-api
            context: apps/api
            dockerfile: apps/api/Dockerfile
          - name: truss-dashboard
            context: .
            dockerfile: selfhosted/Dockerfile.dashboard
          - name: truss-mcp
            context: apps/mcp
            dockerfile: apps/mcp/Dockerfile
          - name: truss-operator
            context: operator
            dockerfile: operator/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Derive version (strip leading v)
        id: ver
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}

      - uses: docker/setup-buildx-action@v3
      - uses: sigstore/cosign-installer@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.name }}
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          # amd64-only: Node crashes (SIGILL) under QEMU arm64 emulation on amd64 runners.
          # arm64 self-hosters build locally (see hack/e2e-compose.sh); native arm64 runners later.
          platforms: linux/amd64
          push: true
          provenance: mode=max   # SLSA build provenance attestation, pushed alongside the image
          sbom: true             # SBOM attestation, pushed alongside the image
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.name }}:${{ steps.ver.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.name }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign the image (cosign keyless)
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.name }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Generate SBOM (syft, SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.name }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom-${{ matrix.name }}.spdx.json

      - name: Attach SBOM to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: sbom-${{ matrix.name }}.spdx.json

  chart:
    name: Package, sign & publish Helm chart
    needs: [release-please, images]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      id-token: write   # cosign keyless
    steps:
      - uses: actions/checkout@v4

      - name: Derive version (strip leading v)
        id: ver
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}

      - uses: azure/setup-helm@v4
      - uses: sigstore/cosign-installer@v3

      - name: Helm registry login
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login "$REGISTRY" --username "${{ github.actor }}" --password-stdin

      - name: Package, push & sign chart
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          helm package charts/truss --version "$VERSION" --app-version "$VERSION"
          # helm push prints the pushed Digest: capture it so cosign signs the exact artifact.
          helm push "truss-${VERSION}.tgz" "oci://${REGISTRY}/${IMAGE_NAMESPACE}/charts" 2>&1 | tee push.log
          DIGEST="$(grep -oE 'sha256:[0-9a-f]{64}' push.log | head -1)"
          test -n "$DIGEST"
          cosign sign --yes "${REGISTRY}/${IMAGE_NAMESPACE}/charts/truss@${DIGEST}"

  operator-installer:
    name: Publish operator install bundle
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Derive version (strip leading v)
        id: ver
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: operator/go.mod

      - name: Build consolidated installer (CRDs + RBAC + manager)
        working-directory: operator
        run: make build-installer IMG="${REGISTRY}/${IMAGE_NAMESPACE}/truss-operator:${{ steps.ver.outputs.version }}"

      - name: Attach install.yaml to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: operator/dist/install.yaml
