name: Release

# Triggered by pushing a semver tag (e.g. v0.2.0).
# Builds + pushes both app images multi-arch to GHCR, packages and publishes
# the umbrella Helm chart as an OCI artifact, then cuts a GitHub Release.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  images:
    name: Build & push images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: truss-api
            context: .
            dockerfile: Dockerfile
          - name: truss-dashboard
            context: .
            dockerfile: selfhosted/Dockerfile.dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Derive version (strip leading v)
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          # amd64-only: Node crashes (SIGILL) under QEMU arm64 emulation on amd64
          # runners. Self-hosters on arm64 build locally via docker-compose; arm64
          # GHCR images can be added later via native arm64 runners.
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.name }}:${{ steps.ver.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.name }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  chart:
    name: Package & publish Helm chart
    runs-on: ubuntu-latest
    needs: images
    steps:
      - uses: actions/checkout@v4

      - name: Derive version (strip leading v)
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: azure/setup-helm@v4

      - name: Helm registry login
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login "$REGISTRY" \
              --username "${{ github.actor }}" --password-stdin

      - name: Package & push chart
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          helm package charts/truss --version "$VERSION" --app-version "$VERSION"
          helm push "truss-${VERSION}.tgz" \
            "oci://${REGISTRY}/${IMAGE_NAMESPACE}/charts"

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [images, chart]
    steps:
      - name: Derive version (strip leading v)
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Truss ${{ github.ref_name }}

            ### Container images (GHCR, linux/amd64 + linux/arm64)

            - `${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/truss-api:${{ steps.ver.outputs.version }}`
            - `${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/truss-dashboard:${{ steps.ver.outputs.version }}`

            Each image is also tagged `latest` and the commit SHA `${{ github.sha }}`.

            ### Helm chart

            ```bash
            helm install truss oci://${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/charts/truss --version ${{ steps.ver.outputs.version }}
            ```
