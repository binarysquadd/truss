# Truss umbrella chart — single-tenant self-host.
# Override secrets before any real deployment (see README "Hardening").

# Public URL the dashboard is served at (used for Kratos CORS/return URLs).
publicUrl: "http://localhost:3000"

images:
  # Truss app images. `tag` is optional and defaults to the chart appVersion,
  # so a release bumps both in lockstep. Override per-component, e.g.:
  #   --set images.api.tag=0.2.0  --set images.dashboard.repository=my.registry/truss-dashboard
  api:
    repository: ghcr.io/binarysquadd/truss-api
    tag: ""        # defaults to .Chart.AppVersion when empty
  dashboard:
    repository: ghcr.io/binarysquadd/truss-dashboard
    tag: ""        # defaults to .Chart.AppVersion when empty
  mcp:
    repository: ghcr.io/binarysquadd/truss-mcp
    tag: ""        # defaults to .Chart.AppVersion when empty
  postgres: postgres:16-alpine
  kratos: oryd/kratos:v1.2.0
  keto: oryd/keto:v0.12.0-alpha.0
  hydra: oryd/hydra:v2.2.0
  oathkeeper: oryd/oathkeeper:v0.40.7
  minio: minio/minio:RELEASE.2024-09-22T00-33-43Z   # pin to a real digest/tag before release
  flagd: ghcr.io/open-feature/flagd:v0.11.1
  valkey: valkey/valkey:8-alpine
  pullPolicy: IfNotPresent

# ─────────────────────────────────────────────────────────────────────────────
# !! INSECURE DEFAULTS — DO NOT SHIP AS-IS !!
# Every value below is a placeholder and MUST be overridden at install time, e.g.:
#   helm install truss ./charts/truss \
#     --set secrets.dbPassword=$(openssl rand -hex 16) \
#     --set secrets.encryptionKey=$(openssl rand -hex 32) \
#     --set secrets.minioSecretKey=$(openssl rand -hex 24) \
#     --set secrets.kratosCookieSecret=$(openssl rand -hex 16) \
#     --set secrets.kratosCipherSecret=$(openssl rand -hex 16)
# Only `encryptionKey` has a runtime guard; the others will silently deploy with
# these well-known values if not overridden. See README "Hardening".
# ─────────────────────────────────────────────────────────────────────────────
secrets:
  dbPassword: "truss"
  encryptionKey: "change-me-encryption-key-32chars-minimum-000000"   # openssl rand -hex 32
  minioAccessKey: "truss-minio"
  minioSecretKey: "change-me-minio-secret-key"
  kratosCookieSecret: "change-me-cookie-secret-32chars!"
  kratosCipherSecret: "change-me-cipher-secret-32chars!"
  hydraSystemSecret: "change-me-hydra-system-secret-32chars-min"   # openssl rand -hex 16
  valkeyPassword: "change-me-valkey-password"   # openssl rand -hex 16

postgres:
  storage: 5Gi
minio:
  storage: 10Gi
  bucket: truss

# Set to your dashboard origin(s) in production; the API CORS fails closed otherwise.
corsAllowedOrigins: "http://localhost:3000"

# Comma-separated Kratos identity IDs granted admin powers (DB roles, migrations,
# backups, authorization rules). Register your account, copy your ID from the
# dashboard's Authentication panel, set it here, and `helm upgrade`. Empty = no
# admins (everyone gets read/write, nobody gets the admin-gated surfaces).
adminIdentityIds: ""

# First-boot default admin: seeded only if no account exists yet, so you can log in
# right after install. The password is generated + printed to the API logs on first
# boot (`kubectl -n truss logs deploy/truss-api`) — change it after first login.
bootstrapAdminEmail: "admin@truss.local"

# MCP server (lets an AI agent operate this instance over the Model Context Protocol).
# Exposed in-cluster as Service truss-mcp:8765 at /mcp; front it with your ingress to
# expose it externally. Callers authenticate with a service_role key.
mcp:
  enabled: true

# Observability — all OFF by default ("instrument, don't impose"). The API always exposes
# Prometheus metrics at /metrics and structured JSON logs to stdout regardless; these toggles
# only add integration artifacts for clusters already running the Prometheus operator / Grafana.
observability:
  # OTLP endpoint for trace/metric/log export, e.g. http://otel-collector.monitoring:4318.
  # Empty = the app's OTEL push is off (it still serves /metrics for scraping). When
  # backends.enabled=true and this is empty, it auto-targets the bundled in-cluster collector.
  otlpEndpoint: ""
  # Create a ServiceMonitor so the Prometheus operator auto-scrapes /metrics (needs its CRDs).
  serviceMonitor:
    enabled: false
    interval: 30s
  # Create a PrometheusRule with the default SLO alerts (needs the operator CRDs).
  prometheusRule:
    enabled: false
  # Ship the Grafana dashboard as a ConfigMap the Grafana sidecar auto-discovers.
  grafanaDashboard:
    enabled: false
  # Bundle a full in-cluster LGTM + OTel Collector stack (same pipeline as the compose overlay).
  # OFF by default. Turn on for a batteries-included 4-signal stack with no external monitoring;
  # leave off (and use serviceMonitor/prometheusRule/otlpEndpoint) to feed an existing cluster stack.
  # Storage is ephemeral (emptyDir) — override for durable retention or use an external stack.
  backends:
    enabled: false
    images:
      otelCollector: otel/opentelemetry-collector-contrib:0.117.0
      prometheus: prom/prometheus:v3.1.0
      loki: grafana/loki:3.3.2
      tempo: grafana/tempo:2.7.0
      grafana: grafana/grafana:11.5.1

resources:
  small: { requests: { cpu: 50m, memory: 64Mi }, limits: { cpu: 500m, memory: 256Mi } }
  medium: { requests: { cpu: 100m, memory: 256Mi }, limits: { cpu: "1", memory: 1Gi } }
