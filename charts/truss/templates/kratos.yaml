apiVersion: v1
kind: ConfigMap
metadata:
  name: truss-kratos-config
data:
  identity.schema.json: |
    {
      "$id": "https://schemas.ory.sh/presets/kratos/quickstart/email-password/identity.schema.json",
      "$schema": "http://json-schema.org/draft-07/schema#",
      "title": "Person",
      "type": "object",
      "properties": {
        "traits": {
          "type": "object",
          "properties": {
            "email": {
              "type": "string", "format": "email",
              "ory.sh/kratos": {
                "credentials": {
                  "password": { "identifier": true },
                  "code": { "identifier": true, "via": "email" }
                },
                "verification": { "via": "email" },
                "recovery": { "via": "email" }
              }
            }
          },
          "required": ["email"],
          "additionalProperties": false
        }
      }
    }
  kratos.yml: |
    version: v0.13.0
    serve:
      public:
        base_url: {{ .Values.publicUrl }}/.ory/kratos/public/
        cors:
          enabled: true
          allowed_origins: ["{{ .Values.publicUrl }}"]
          allowed_methods: ["POST","GET","PUT","PATCH","DELETE"]
          allowed_headers: ["Authorization","Cookie","Content-Type","X-CSRF-Token"]
          exposed_headers: ["Content-Type","Set-Cookie"]
      admin:
        base_url: http://truss-kratos:4434/
    selfservice:
      default_browser_return_url: {{ .Values.publicUrl }}/
      methods:
        password: { enabled: true, config: { haveibeenpwned_enabled: true, min_password_length: 8 } }
        code: { enabled: true, config: { lifespan: 15m } }
      flows:
        login: { ui_url: {{ .Values.publicUrl }}/login, lifespan: 10m }
        registration:
          ui_url: {{ .Values.publicUrl }}/register
          lifespan: 10m
          after: { password: { hooks: [{ hook: session }] } }
        verification: { enabled: true, ui_url: {{ .Values.publicUrl }}/verification, use: code }
        recovery: { enabled: true, ui_url: {{ .Values.publicUrl }}/recovery, use: code }
        settings: { ui_url: {{ .Values.publicUrl }}/settings }
    session:
      lifespan: 24h
      cookie: { name: ory_kratos_session, same_site: Lax }
    courier:
      smtp: { connection_uri: "smtp://not-configured:25", from_address: noreply@truss.local, from_name: Truss }
    identity:
      default_schema_id: default
      schemas:
        - id: default
          url: file:///etc/kratos/identity.schema.json
    log: { level: info, format: json }
---
apiVersion: v1
kind: Service
metadata:
  name: truss-kratos
spec:
  selector: { app: truss-kratos }
  ports:
    - { name: public, port: 4433, targetPort: 4433 }
    - { name: admin, port: 4434, targetPort: 4434 }
---
apiVersion: batch/v1
kind: Job
metadata:
  name: truss-kratos-migrate
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: {{ .Values.images.kratos }}
          command: ["/bin/sh", "-ec"]
          env:
            - name: DSN
              valueFrom: { secretKeyRef: { name: truss-secrets, key: database-url } }
          args:
            - |
              until nc -z truss-postgres 5432; do echo "wait pg"; sleep 2; done
              kratos migrate sql -e --yes "$DSN"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: truss-kratos
spec:
  replicas: 1
  selector:
    matchLabels: { app: truss-kratos }
  template:
    metadata:
      labels: { app: truss-kratos }
    spec:
      initContainers:
        - name: wait-migrate
          image: {{ .Values.images.kratos }}
          command: ["/bin/sh","-ec","until kratos migrate sql -e --yes \"$DSN\" >/dev/null 2>&1; do echo 'wait kratos migrate'; sleep 3; done"]
          env:
            - name: DSN
              valueFrom: { secretKeyRef: { name: truss-secrets, key: database-url } }
      containers:
        - name: kratos
          image: {{ .Values.images.kratos }}
          args: ["serve", "all", "--config", "/etc/kratos/kratos.yml"]
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: DSN
              valueFrom: { secretKeyRef: { name: truss-secrets, key: database-url } }
            - name: SECRETS_COOKIE
              valueFrom: { secretKeyRef: { name: truss-secrets, key: kratos-cookie-secret } }
            - name: SECRETS_CIPHER
              valueFrom: { secretKeyRef: { name: truss-secrets, key: kratos-cipher-secret } }
          ports: [{ containerPort: 4433 }, { containerPort: 4434 }]
          readinessProbe: { httpGet: { path: /admin/health/ready, port: 4434 }, initialDelaySeconds: 5, periodSeconds: 10 }
          volumeMounts: [{ name: config, mountPath: /etc/kratos }]
          resources: {{- toYaml .Values.resources.small | nindent 12 }}
      volumes:
        - name: config
          configMap: { name: truss-kratos-config }
