apiVersion: v1
kind: Secret
metadata:
  name: truss-secrets
type: Opaque
stringData:
  db-password: {{ .Values.secrets.dbPassword | quote }}
  encryption-key: {{ .Values.secrets.encryptionKey | quote }}
  minio-access-key: {{ .Values.secrets.minioAccessKey | quote }}
  minio-secret-key: {{ .Values.secrets.minioSecretKey | quote }}
  kratos-cookie-secret: {{ .Values.secrets.kratosCookieSecret | quote }}
  kratos-cipher-secret: {{ .Values.secrets.kratosCipherSecret | quote }}
  hydra-system-secret: {{ .Values.secrets.hydraSystemSecret | quote }}
  valkey-password: {{ .Values.secrets.valkeyPassword | quote }}
  database-url: "postgres://truss:{{ .Values.secrets.dbPassword }}@truss-postgres:5432/truss?sslmode=disable"
  keto-database-url: "postgres://truss:{{ .Values.secrets.dbPassword }}@truss-postgres:5432/truss?sslmode=disable&search_path=keto"
  hydra-database-url: "postgres://truss:{{ .Values.secrets.dbPassword }}@truss-postgres:5432/truss?sslmode=disable&search_path=hydra"
