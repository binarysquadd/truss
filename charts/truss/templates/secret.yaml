{{- /* Auto-generate any secret left blank; reuse the in-cluster value on upgrade (see _helpers.tpl). */}}
{{- $ex := (lookup "v1" "Secret" .Release.Namespace "truss-secrets") }}
{{- $d := (and $ex $ex.data) | default dict }}
{{- $dbPassword := include "truss.secret" (dict "v" .Values.secrets.dbPassword "d" $d "k" "db-password" "n" 24) }}
{{- $encryptionKey := include "truss.secret" (dict "v" .Values.secrets.encryptionKey "d" $d "k" "encryption-key" "n" 48) }}
{{- $minioAccessKey := include "truss.secret" (dict "v" .Values.secrets.minioAccessKey "d" $d "k" "minio-access-key" "n" 20) }}
{{- $minioSecretKey := include "truss.secret" (dict "v" .Values.secrets.minioSecretKey "d" $d "k" "minio-secret-key" "n" 40) }}
{{- $kratosCookieSecret := include "truss.secret" (dict "v" .Values.secrets.kratosCookieSecret "d" $d "k" "kratos-cookie-secret" "n" 32) }}
{{- $kratosCipherSecret := include "truss.secret" (dict "v" .Values.secrets.kratosCipherSecret "d" $d "k" "kratos-cipher-secret" "n" 32) }}
{{- $hydraSystemSecret := include "truss.secret" (dict "v" .Values.secrets.hydraSystemSecret "d" $d "k" "hydra-system-secret" "n" 32) }}
{{- $valkeyPassword := include "truss.secret" (dict "v" .Values.secrets.valkeyPassword "d" $d "k" "valkey-password" "n" 24) }}
apiVersion: v1
kind: Secret
metadata:
  name: truss-secrets
type: Opaque
stringData:
  db-password: {{ $dbPassword | quote }}
  encryption-key: {{ $encryptionKey | quote }}
  minio-access-key: {{ $minioAccessKey | quote }}
  minio-secret-key: {{ $minioSecretKey | quote }}
  kratos-cookie-secret: {{ $kratosCookieSecret | quote }}
  kratos-cipher-secret: {{ $kratosCipherSecret | quote }}
  hydra-system-secret: {{ $hydraSystemSecret | quote }}
  valkey-password: {{ $valkeyPassword | quote }}
  database-url: "postgres://truss:{{ $dbPassword }}@truss-postgres:5432/truss?sslmode=disable"
  keto-database-url: "postgres://truss:{{ $dbPassword }}@truss-postgres:5432/truss?sslmode=disable&search_path=keto"
  hydra-database-url: "postgres://truss:{{ $dbPassword }}@truss-postgres:5432/truss?sslmode=disable&search_path=hydra"
