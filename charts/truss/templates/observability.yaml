{{- if .Values.observability.serviceMonitor.enabled }}
# ServiceMonitor — the Prometheus operator turns this into scrape config for /metrics.
# Requires the operator CRDs (e.g. kube-prometheus-stack); off by default.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: truss-api
  labels: { app: truss-api }
spec:
  selector:
    matchLabels: { app: truss-api }
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.observability.serviceMonitor.interval | default "30s" }}
{{- end }}
{{- if .Values.observability.prometheusRule.enabled }}
---
# PrometheusRule — multi-window, multi-burn-rate SLO alerting (Google SRE method) for a
# 99.5%/30d availability objective (0.5% error budget), plus supplementary latency + DB-pool
# alerts. Requires the Prometheus operator CRDs.
#
# NOTE: no {service="truss-api"} selector — under the OTEL SDK the service name lives in
# target_info / otel_scope_name, not a per-series label, and the truss_ metric names are unique.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: truss-api
  labels: { app: truss-api }
spec:
  groups:
    - name: truss-api.slo
      rules:
        # Fast burn: 14.4x budget consumption over 1h AND 5m windows → page.
        - alert: TrussApiErrorBudgetBurnFast
          expr: |
            (
              sum(rate(truss_http_request_duration_seconds_count{status_code=~"5.."}[1h]))
                / sum(rate(truss_http_request_duration_seconds_count[1h])) > (14.4 * 0.005)
            ) and (
              sum(rate(truss_http_request_duration_seconds_count{status_code=~"5.."}[5m]))
                / sum(rate(truss_http_request_duration_seconds_count[5m])) > (14.4 * 0.005)
            )
          for: 2m
          labels: { severity: critical }
          annotations:
            summary: "Truss API burning error budget fast (14.4x over 1h and 5m)"
        # Slow burn: 6x consumption over 6h AND 30m windows → warn.
        - alert: TrussApiErrorBudgetBurnSlow
          expr: |
            (
              sum(rate(truss_http_request_duration_seconds_count{status_code=~"5.."}[6h]))
                / sum(rate(truss_http_request_duration_seconds_count[6h])) > (6 * 0.005)
            ) and (
              sum(rate(truss_http_request_duration_seconds_count{status_code=~"5.."}[30m]))
                / sum(rate(truss_http_request_duration_seconds_count[30m])) > (6 * 0.005)
            )
          for: 15m
          labels: { severity: warning }
          annotations:
            summary: "Truss API burning error budget slowly (6x over 6h and 30m)"
        - alert: TrussApiHighLatencyP95
          expr: |
            histogram_quantile(0.95, sum by (le) (rate(truss_http_request_duration_seconds_bucket[5m]))) > 0.5
          for: 10m
          labels: { severity: warning }
          annotations:
            summary: "Truss API p95 latency above 500ms (10m)"
        - alert: TrussApiDbPoolSaturated
          expr: truss_db_pool_connections{state="waiting"} > 0
          for: 5m
          labels: { severity: warning }
          annotations:
            summary: "Truss API DB pool has waiting connections (saturated)"
{{- end }}
{{- if .Values.observability.grafanaDashboard.enabled }}
---
# Grafana dashboard shipped as a ConfigMap; the Grafana sidecar auto-loads any ConfigMap
# labeled grafana_dashboard. Dashboard JSON lives in charts/truss/dashboards/.
apiVersion: v1
kind: ConfigMap
metadata:
  name: truss-api-dashboard
  labels:
    grafana_dashboard: "1"
data:
  truss-api.json: |
{{ .Files.Get "dashboards/truss-api.json" | indent 4 }}
{{- end }}
