apiVersion: v1
kind: Service
metadata:
  name: truss-dashboard
spec:
  selector: { app: truss-dashboard }
  ports: [{ port: 80, targetPort: 80 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: truss-dashboard
spec:
  replicas: 1
  selector:
    matchLabels: { app: truss-dashboard }
  template:
    metadata:
      labels: { app: truss-dashboard }
    spec:
      containers:
        - name: dashboard
          image: "{{ .Values.images.dashboard.repository }}:{{ .Values.images.dashboard.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          # Standard nginx:alpine master starts as root to bind :80 and spawn
          # The nginx image starts as root to chown its cache dirs + bind :80, then
          # drops to the nginx worker user — so it needs default caps (CHOWN/SETUID).
          # Dropping ALL caps or runAsNonRoot breaks startup.
          securityContext:
            allowPrivilegeEscalation: false
          ports: [{ containerPort: 80 }]
          readinessProbe: { httpGet: { path: /, port: 80 }, initialDelaySeconds: 5, periodSeconds: 10 }
          resources: {{- toYaml .Values.resources.small | nindent 12 }}
