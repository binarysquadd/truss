apiVersion: v1
kind: Service
metadata:
  name: truss-api
  labels: { app: truss-api }
spec:
  selector: { app: truss-api }
  ports: [{ name: http, port: 8787, targetPort: 8787 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: truss-api
spec:
  replicas: 1
  selector:
    matchLabels: { app: truss-api }
  template:
    metadata:
      labels: { app: truss-api }
    spec:
      initContainers:
        - name: wait-deps
          image: busybox:1.36
          command: ["/bin/sh","-ec","until nc -z truss-postgres 5432 && nc -z truss-kratos 4434 && nc -z truss-keto 4466 && nc -z truss-minio 9000; do echo 'waiting for deps'; sleep 3; done"]
      containers:
        - name: truss-api
          image: "{{ .Values.images.api.repository }}:{{ .Values.images.api.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          # Dockerfile runs as `USER node` (uid 1000) — pin the numeric uid/gid so
          # kube can verify non-root (a named user fails the runAsNonRoot check).
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop: ["ALL"]
          ports: [{ containerPort: 8787 }]
          env:
            - { name: TRUSS_SELF_HOSTED, value: "true" }
            - { name: TRUSS_AUTH_REQUIRED, value: "true" }
            - { name: NODE_ENV, value: "production" }
            - { name: API_PORT, value: "8787" }
            # Drives the session-cookie Secure flag from the URL scheme (http → off so
            # the cookie survives plain-HTTP/localhost; https → on).
            - { name: TRUSS_PUBLIC_URL, value: {{ .Values.publicUrl | quote }} }
            {{- if .Values.observability.otlpEndpoint }}
            # Tracing is opt-in: set observability.otlpEndpoint to export spans (otel.js no-ops otherwise).
            - { name: OTEL_EXPORTER_OTLP_ENDPOINT, value: {{ .Values.observability.otlpEndpoint | quote }} }
            {{- end }}
            - name: DATABASE_URL
              valueFrom: { secretKeyRef: { name: truss-secrets, key: database-url } }
            - name: ENCRYPTION_KEY
              valueFrom: { secretKeyRef: { name: truss-secrets, key: encryption-key } }
            - { name: KRATOS_PUBLIC_URL, value: "http://truss-kratos:4433" }
            - { name: KRATOS_ADMIN_URL, value: "http://truss-kratos:4434" }
            - { name: KETO_READ_URL, value: "http://truss-keto:4466" }
            - { name: KETO_WRITE_URL, value: "http://truss-keto:4467" }
            - { name: HYDRA_PUBLIC_URL, value: "http://truss-hydra:4444" }
            - { name: HYDRA_ADMIN_URL, value: "http://truss-hydra:4445" }
            - { name: OATHKEEPER_PROXY_URL, value: "http://truss-oathkeeper:4455" }
            - { name: OATHKEEPER_ADMIN_URL, value: "http://truss-oathkeeper:4456" }
            - { name: VALKEY_HOST, value: "truss-valkey" }
            - { name: VALKEY_PORT, value: "6379" }
            - name: VALKEY_PASSWORD
              valueFrom: { secretKeyRef: { name: truss-secrets, key: valkey-password } }
            - { name: MINIO_S3_ENDPOINT, value: "http://truss-minio:9000" }
            - name: MINIO_ACCESS_KEY
              valueFrom: { secretKeyRef: { name: truss-secrets, key: minio-access-key } }
            - name: MINIO_SECRET_KEY
              valueFrom: { secretKeyRef: { name: truss-secrets, key: minio-secret-key } }
            - { name: FLAGD_HOST, value: "http://truss-flagd" }
            - { name: FLAGD_PORT, value: "8013" }
            - { name: CORS_ALLOWED_ORIGINS, value: {{ .Values.corsAllowedOrigins | quote }} }
            - { name: TRUSS_ADMIN_IDENTITY_IDS, value: {{ .Values.adminIdentityIds | quote }} }
            # First-boot default admin (seeded if no identity exists). Password unset =
            # a random one is generated + printed to the API logs; read it with
            # `kubectl -n truss logs deploy/truss-api`. Override via secret if you want.
            - { name: TRUSS_BOOTSTRAP_ADMIN_EMAIL, value: {{ .Values.bootstrapAdminEmail | quote }} }
          readinessProbe: { httpGet: { path: /api/health, port: 8787 }, initialDelaySeconds: 10, periodSeconds: 10 }
          livenessProbe: { httpGet: { path: /api/health, port: 8787 }, initialDelaySeconds: 30, periodSeconds: 30 }
          resources: {{- toYaml .Values.resources.medium | nindent 12 }}
