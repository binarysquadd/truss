apiVersion: v1
kind: Service
metadata:
  name: truss-valkey
spec:
  selector: { app: truss-valkey }
  ports:
    - { name: redis, port: 6379, targetPort: 6379 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: truss-valkey
spec:
  replicas: 1
  selector:
    matchLabels: { app: truss-valkey }
  template:
    metadata:
      labels: { app: truss-valkey }
    spec:
      containers:
        - name: valkey
          image: {{ .Values.images.valkey }}
          # Ephemeral cache: persistence (RDB/AOF) off, so nothing is written to disk
          # — no volume, no chown, no fsGroup needed. requirepass is read from env.
          command: ["sh", "-c", "exec valkey-server --requirepass \"$VALKEY_PASSWORD\" --save \"\" --appendonly no"]
          # NOTE: runAsNonRoot/runAsUser intentionally not pinned yet — the valkey
          # image declares a named user; pin the numeric uid after verifying it
          # (see the keto/api pattern). No disk writes, so this is safe meanwhile.
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: VALKEY_PASSWORD
              valueFrom: { secretKeyRef: { name: truss-secrets, key: valkey-password } }
          ports: [{ containerPort: 6379 }]
          readinessProbe:
            exec:
              command: ["sh", "-c", "valkey-cli -a \"$VALKEY_PASSWORD\" ping | grep -q PONG"]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources: {{- toYaml .Values.resources.small | nindent 12 }}
